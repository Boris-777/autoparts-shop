<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин автозапчастей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Добро пожаловать в наш магазин!</h1>
    <input type="text" id="search" placeholder="Поиск товаров..." onkeyup="searchProducts()">
    
    <div id="products">
        <div class="product" data-name="Фильтр масляный">
            <img src="images/filter.jpg" alt="Фильтр масляный">
            <p>Фильтр масляный - 30₾</p>
        </div>
        <div class="product" data-name="Свечи зажигания">
            <img src="images/svechi.jpg" alt="Свечи зажигания">
            <p>Свечи зажигания - 50₾</p>
        </div>
        <div class="product" data-name="Тормозные колодки">
            <img src="images/kolodki.jpg" alt="Тормозные колодки">
            <p>Тормозные колодки - 80₾</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
